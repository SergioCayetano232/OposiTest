<div class="cabecera-flotante">
  <a class="volver-inicio" routerLink="/">← Volver</a>
  <app-boton-tema />
</div>

<section class="tarjeta-acceso">
  <h1>Entrar</h1>
  <p class="subtitulo">Accede a tu cuenta de OposiTest</p>

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  <form (ngSubmit)="entrar()">
    <div class="campo">
      <label for="email">Correo electrónico</label>
      <input id="email" type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="password"
        required
        autocomplete="current-password"
      />
    </div>

    <button class="btn-principal" type="submit" [disabled]="enviando || !email || !password">
      {{ enviando ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>

  <p class="pie">¿No tienes cuenta? <a routerLink="/registro">Crear una</a></p>
</section>
