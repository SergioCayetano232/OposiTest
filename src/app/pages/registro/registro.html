<div class="cabecera-flotante">
  <a class="volver-inicio" routerLink="/">← Volver</a>
  <app-boton-tema />
</div>

<section class="tarjeta-acceso">
  <h1>Crear cuenta</h1>
  <p class="subtitulo">Guarda tus intentos y tus mejores notas</p>

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  @if (auth.despertando()) {
    <p class="aviso">Conectando con el servidor. La primera vez puede tardar un minuto.</p>
  }

  <form (ngSubmit)="registrar()">
    <div class="campo">
      <label for="email">Correo electrónico</label>
      <input id="email" type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="password"
        required
        autocomplete="new-password"
      />
      <p class="pista">Mínimo 8 caracteres, con una letra y un número</p>
    </div>

    <button class="btn-principal" type="submit" [disabled]="enviando || !email || !password">
      {{ enviando ? 'Enviando el código...' : 'Crear cuenta' }}
    </button>
  </form>

  <p class="pie">¿Ya tienes cuenta? <a routerLink="/login">Entrar</a></p>
</section>
