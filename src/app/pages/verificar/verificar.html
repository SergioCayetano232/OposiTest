<div class="cabecera-flotante">
  <a class="volver-inicio" routerLink="/">← Volver</a>
  <app-boton-tema />
</div>

<section class="tarjeta-acceso">
  <h1>Revisa tu correo</h1>
  <p class="subtitulo">Te hemos enviado un código de 6 dígitos a <strong>{{ email }}</strong></p>

  @if (error) {
    <p class="error">{{ error }}</p>
  } @else {
    <p class="aviso">Si no lo ves en unos segundos, mira en la carpeta de spam.</p>
  }

  <form (ngSubmit)="verificar()">
    <div class="campo">
      <label for="codigo">Código de verificación</label>
      <input
        id="codigo"
        class="codigo"
        name="codigo"
        [(ngModel)]="codigo"
        (ngModelChange)="alEscribir()"
        inputmode="numeric"
        maxlength="6"
        placeholder="000000"
        autocomplete="one-time-code"
      />
    </div>

    <button class="btn-principal" type="submit" [disabled]="enviando || codigo.length !== 6">
      {{ enviando ? 'Comprobando...' : 'Verificar cuenta' }}
    </button>
  </form>

  <p class="pie">¿Te has equivocado de correo? <a routerLink="/registro">Empezar de nuevo</a></p>
</section>
